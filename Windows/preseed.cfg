d-i debian-installer/language string de
d-i debian-installer/country string DE
d-i debian-installer/locale string de_DE.UTF-8
d-i keyboard-configuration/xkb-keymap select de

d-i netcfg/choose_interface select auto

d-i netcfg/hostname string VKSFutro
d-i netcfg/get_hostname unassigned-hostname 
d-i netcfg/get_domain unassigned-domain
d-i netcfg/get_hostname seen true
d-i netcfg/get_domain seen true
d-i hw-detect/load_firmware boolean true
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

d-i partman-auto/method string regular

d-i partman-auto/init_automatically_partition select Guided - use entire disk
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

d-i mirror/country string manual
d-i mirror/http/hostname string ftp.de.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string


# root Passwort hier anpassen

d-i passwd/root-password password mussuändern
d-i passwd/root-password-again password mussuändern
d-i passwd/make-user boolean true
d-i passwd/user-fullname string vksuser
d-i passwd/username string vksuser
d-i passwd/user-password password vksuser
d-i passwd/user-password-again password vksuser
d-i passwd/user-default-groups string audio cdrom video sudo

d-i clock-setup/utc boolean true
d-i time/zone string Europe/Berlin

tasksel tasksel/first multiselect standard,ssh-server


d-i pkgsel/upgrade select full-upgrade
popularity-contest popularity-contest/participate boolean false

d-i preseed/late_command string \
	cp -a /cdrom/install/make_vks.sh /target/root/; \
	cp -a /cdrom/install/overlay.py /target/root/; \
	in-target chmod +x /root/make_vks.sh; \
	in-target sh -c 'echo "[Unit]" > /etc/systemd/system/firstboot.service'; \
	in-target sh -c 'echo "Description=Firstboot Setup Script" >> /etc/systemd/system/firstboot.service'; \
	in-target sh -c 'echo "After=network-online.target" >> /etc/systemd/system/firstboot.service'; \
	in-target sh -c 'echo "[Service]" >> /etc/systemd/system/firstboot.service'; \
	in-target sh -c 'echo "Type=oneshot" >> /etc/systemd/system/firstboot.service'; \
	in-target sh -c 'echo "ExecStart=/root/make_vks.sh > >(tee -a "/var/log/firstboot.log") 2>&1" >> /etc/systemd/system/firstboot.service'; \
	in-target sh -c 'echo "RemainAfterExit=yes" >> /etc/systemd/system/firstboot.service'; \
	in-target sh -c 'echo "[Install]" >> /etc/systemd/system/firstboot.service'; \
	in-target sh -c 'echo "WantedBy=multi-user.target" >> /etc/systemd/system/firstboot.service'; \
	
	in-target systemctl enable firstboot.service

	d-i grub-installer/only_debian boolean true
	d-i finish-install/reboot_in_progress note
